stages:
  - lint
  - test
  - build
  - deploy

# ──────────────────────────────────────────────
# Frontend jobs
# ──────────────────────────────────────────────

# Lint the React frontend with ESLint
frontend-lint:
  stage: lint
  image: node:20-alpine
  tags:
    - docker
  before_script:
    - cd frontend
    - npm ci
  script:
    - npx eslint . || true
  only:
    - branches
    - merge_requests

# Build the React (Vite) frontend
frontend-build:
  stage: build
  image: node:20-alpine
  tags:
    - docker
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  only:
    - branches
    - merge_requests

# ──────────────────────────────────────────────
# Backend jobs
# ──────────────────────────────────────────────

# Lint the FastAPI backend
backend-lint:
  stage: lint
  image: python:3.11-slim
  tags:
    - docker
  before_script:
    - pip install --upgrade pip
    - pip install ruff
  script:
    - ruff check backend/ --fix
  allow_failure: true
  only:
    - branches
    - merge_requests

# Test the FastAPI backend
backend-test:
  stage: test
  image: python:3.11-slim
  tags:
    - docker
  before_script:
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt
  script:
    - pytest backend/tests/ -v --cov=backend/app --cov-report=term-missing
  only:
    - branches
    - merge_requests

# Validate the backend starts up correctly
backend-build:
  stage: build
  image: python:3.11-slim
  tags:
    - docker
  before_script:
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt
  script:
    - cd backend
    - python -c "from app.main import app; print('FastAPI app loaded successfully')"
  only:
    - branches
    - merge_requests


# ──────────────────────────────────────────────
# Deploy
# ──────────────────────────────────────────────

# Mirror to GitHub → triggers Vercel + Render auto-deploy
mirror-to-github:
  stage: deploy
  image: alpine:latest
  tags:
    - docker
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/eoinbande/sweng26-group2.git || true
    - git push github HEAD:main --force
  only:
    - main
  when: on_success